<!DOCTYPE html>
<html>
<head>
    <title>CityBuddy</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
    <h1>CityBuddy</h1>

    <form method="get" class="filters">
        <input name="city" placeholder="City">
        
        <select name="role">
            <option value="">All</option>
            <option>Local Guide</option>
            <option>Friend</option>
            <option>Listener</option>
        </select>

        <button>Search</button>
    </form>

    <a href="/login" class="cta">Admin</a>
</div>

<div class="container">

    {% for p in posts %}
    <div class="card">
        <div class="top">
            <div>
                <h2>{{ p.name }}</h2>
                <p class="city">📍 {{ p.city }}</p>
            </div>

            <div class="price">₹{{ p.price }}</div>
        </div>

        <span class="tag">{{ p.role }}</span>

        <p class="desc">{{ p.description }}</p>

        <div class="actions">
            <a href="tel:{{ p.contact }}">Call</a>
            <a href="https://wa.me/{{ p.contact }}" target="_blank">WhatsApp</a>
        </div>
    </div>
    {% endfor %}

</div>

</body>
</html>
